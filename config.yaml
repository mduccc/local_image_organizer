model:
  name: "ViT-B-32"
  pretrained: "laion2b_s34b_b79k"
  device: "cpu"

categories:

  # ==============================
  # PEOPLE
  # ==============================

  - id: "people_portrait"
    name: "Portrait"
    prompts:
      - "portrait of a person"
      - "close up face photo"
      - "studio portrait"
      - "person looking at camera"
      - "man standing indoors"
      - "woman portrait natural light"
      - "person sitting alone"
      - "casual portrait at home"

  - id: "family"
    name: "Family"
    prompts:
      - "family photo at home"
      - "parents with children"
      - "family gathering"
      - "family group portrait"
      - "family meal together"
      - "family celebration moment"

  - id: "kids_babies"
    name: "Kids / Babies"
    prompts:
      - "photo of a baby"
      - "kids playing"
      - "young child smiling"
      - "toddler indoors"
      - "child outdoors in park"
      - "school age kid portrait"

  - id: "group_people"
    name: "Group / Friends"
    prompts:
      - "group photo of friends"
      - "people posing together"
      - "friends at a party"
      - "group selfie"
      - "team photo"
      - "people standing together indoors"

  # ==============================
  # ANIMALS
  # ==============================

  - id: "pets"
    name: "Pets"
    prompts:
      - "pet dog"
      - "pet cat"
      - "animal indoors"
      - "cute pet at home"
      - "dog lying on floor"
      - "cat close up portrait"

  - id: "wildlife"
    name: "Wildlife"
    prompts:
      - "wild animal in nature"
      - "bird outdoors"
      - "animal in forest"
      - "wildlife photography"
      - "animal in grass field"
      - "bird sitting on branch"

  # ==============================
  # TRAVEL & LANDSCAPE
  # ==============================

  - id: "landscape"
    name: "Landscape"
    prompts:
      - "landscape photo"
      - "mountains and sky"
      - "river and trees"
      - "nature scenery"
      - "railway tracks in park"
      - "field with grass and houses"
      - "park with green trees"
      - "open field countryside"

  - id: "beach"
    name: "Beach"
    prompts:
      - "beach with ocean"
      - "people at the beach"
      - "waves and sand"
      - "tropical seaside"
      - "coastline view"
      - "sunset at the beach"

  - id: "city"
    name: "City"
    prompts:
      - "city skyline"
      - "street with buildings"
      - "urban scene"
      - "downtown area"
      - "city at night"
      - "apartment buildings"
      - "road with traffic lights"

  - id: "travel"
    name: "Travel"
    prompts:
      - "tourist at landmark"
      - "vacation photo"
      - "travel photo"
      - "sightseeing"
      - "famous building"
      - "temple or historic architecture"

  # ==============================
  # DAILY LIFE
  # ==============================

  - id: "home_indoor"
    name: "Indoor / Home"
    prompts:
      - "living room interior"
      - "kitchen scene"
      - "indoor home photo"
      - "room with furniture"
      - "hallway interior"
      - "person inside building"
      - "corridor perspective"

  - id: "street_life"
    name: "Street Life"
    prompts:
      - "street photography"
      - "people walking on street"
      - "busy market"
      - "urban daily life"
      - "railway tracks in city"
      - "sidewalk in neighborhood"

  # ==============================
  # FOOD & DRINKS
  # ==============================

  - id: "food"
    name: "Food"
    prompts:
      - "plate of food"
      - "restaurant dish"
      - "meal on table"
      - "close up food photo"
      - "home cooked meal"
      - "food photography indoors"

  - id: "drinks"
    name: "Drinks"
    prompts:
      - "coffee cup"
      - "drink in glass"
      - "beverage on table"
      - "latte art"
      - "bottle of drink"
      - "tea cup on table"

  # ==============================
  # WORK & DOCUMENTS
  # ==============================

  - id: "documents"
    name: "Documents"
    prompts:
      - "scanned document"
      - "paper with text"
      - "printed page"
      - "document on desk"
      - "official paper"
      - "form with writing"

  - id: "whiteboard_notes"
    name: "Whiteboard / Notes"
    prompts:
      - "whiteboard with writing"
      - "handwritten notes"
      - "sketch on paper"
      - "diagram on board"
      - "notebook with pen"

  - id: "screenshot"
    name: "Screenshot"
    prompts:
      - "computer screenshot"
      - "mobile screen screenshot"
      - "software window screenshot"
      - "chat app screenshot"
      - "code editor screenshot"

  # ==============================
  # OTHERS
  # ==============================

  - id: "vehicles"
    name: "Vehicles"
    prompts:
      - "car on the road"
      - "motorcycle parked"
      - "vehicle outdoors"
      - "car close up"
      - "bicycle on street"
      - "train on railway"

  - id: "products_objects"
    name: "Products / Objects"
    prompts:
      - "product photo"
      - "object on table"
      - "gadget on desk"
      - "studio object photo"
      - "book on wooden table"
      - "small object close up"

  - id: "flowers_plants"
    name: "Flowers / Plants"
    prompts:
      - "flowers in a field"
      - "close up flower"
      - "plants and grass"
      - "orange flowers in garden"
      - "green grass close up"
      - "macro flower photography"

  - id: "books"
    name: "Books"
    prompts:
      - "book on table"
      - "hardcover book"
      - "book cover close up"
      - "reading book indoors"
      - "stack of books"
      - "book lying on desk"

  - id: "sunset"
    name: "Sunset"
    prompts:
      - "sunset sky"
      - "dramatic clouds at sunset"
      - "orange sky evening"
      - "sunset landscape"
      - "sunset with dark silhouette"
      - "evening sky with clouds"

thresholds:
  similarity_min: 0.15

behavior:
  move_files: true
  keep_folder_structure: false
  dry_run: true

files:
  extensions:
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".bmp"
    - ".webp"
    - ".heic"
    - ".gif"
    # RAW formats (require rawpy)
    - ".dng"
    - ".raf"
    - ".cr2"
    - ".cr3"
    - ".nef"
    - ".arw"
    - ".rw2"
    - ".orf"
    - ".pef"
    - ".srw"