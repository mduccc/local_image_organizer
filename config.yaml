model:
  name: "ViT-B-32"
  pretrained: "laion2b_s34b_b79k"
  device: "cpu"

categories:

  # ==============================
  # CON NGƯỜI
  # ==============================

  - id: "people_portrait"
    name: "Chân dung"
    prompts:
      - "portrait of a person"
      - "close up face photo"
      - "studio portrait"
      - "person looking at camera"

  - id: "family"
    name: "Gia đình"
    prompts:
      - "family photo at home"
      - "parents with children"
      - "family gathering"
      - "family group portrait"

  - id: "kids_babies"
    name: "Trẻ em / em bé"
    prompts:
      - "photo of a baby"
      - "kids playing"
      - "young child smiling"
      - "toddler indoors"

  - id: "group_people"
    name: "Nhóm người / bạn bè"
    prompts:
      - "group photo of friends"
      - "people posing together"
      - "friends at a party"
      - "group selfie"

  # ==============================
  # ĐỘNG VẬT
  # ==============================

  - id: "pets"
    name: "Thú cưng"
    prompts:
      - "pet dog"
      - "pet cat"
      - "animal indoors"
      - "cute pet at home"

  - id: "wildlife"
    name: "Động vật hoang dã"
    prompts:
      - "wild animal in nature"
      - "bird outdoors"
      - "animal in forest"
      - "wildlife photography"

  # ==============================
  # DU LỊCH & PHONG CẢNH
  # ==============================

  - id: "landscape"
    name: "Phong cảnh"
    prompts:
      - "landscape photo"
      - "mountains and sky"
      - "river and trees"
      - "nature scenery"

  - id: "beach"
    name: "Biển"
    prompts:
      - "beach with ocean"
      - "people at the beach"
      - "waves and sand"
      - "tropical seaside"

  - id: "city"
    name: "Thành phố"
    prompts:
      - "city skyline"
      - "street with buildings"
      - "urban scene"
      - "downtown area"

  - id: "travel"
    name: "Du lịch"
    prompts:
      - "tourist at landmark"
      - "vacation photo"
      - "travel photo"
      - "sightseeing"

  # ==============================
  # SINH HOẠT & ĐỜI SỐNG
  # ==============================

  - id: "home_indoor"
    name: "Trong nhà"
    prompts:
      - "living room interior"
      - "kitchen scene"
      - "indoor home photo"
      - "room with furniture"

  - id: "street_life"
    name: "Đường phố"
    prompts:
      - "street photography"
      - "people walking on street"
      - "busy market"
      - "urban daily life"

  # ==============================
  # ĐỒ ĂN & ĐỒ UỐNG
  # ==============================

  - id: "food"
    name: "Đồ ăn"
    prompts:
      - "plate of food"
      - "restaurant dish"
      - "meal on table"
      - "close up food photo"

  - id: "drinks"
    name: "Đồ uống"
    prompts:
      - "coffee cup"
      - "drink in glass"
      - "beverage on table"
      - "latte art"

  # ==============================
  # CÔNG VIỆC & TÀI LIỆU
  # ==============================

  - id: "documents"
    name: "Tài liệu"
    prompts:
      - "scanned document"
      - "paper with text"
      - "printed page"
      - "document on desk"

  - id: "whiteboard_notes"
    name: "Ghi chú / bảng trắng"
    prompts:
      - "whiteboard with writing"
      - "handwritten notes"
      - "sketch on paper"
      - "diagram on board"

  - id: "screenshot"
    name: "Screenshot"
    prompts:
      - "computer screenshot"
      - "mobile screen screenshot"
      - "software window screenshot"
      - "chat app screenshot"

  # ==============================
  # KHÁC
  # ==============================

  - id: "vehicles"
    name: "Xe cộ"
    prompts:
      - "car on the road"
      - "motorcycle parked"
      - "vehicle outdoors"
      - "car close up"

  - id: "products_objects"
    name: "Sản phẩm / đồ vật"
    prompts:
      - "product photo"
      - "object on table"
      - "gadget on desk"
      - "studio object photo"


  - id: "flowers_plants"
    name: "Hoa / cây cối"
    prompts:
      - "flowers in a field"
      - "close up flower"
      - "plants and grass"
      - "orange flowers in garden"

  - id: "books"
    name: "Sách"
    prompts:
      - "book on table"
      - "hardcover book"
      - "book cover close up"
      - "reading book indoors"

  - id: "sunset"
    name: "Hoàng hôn"
    prompts:
      - "sunset sky"
      - "dramatic clouds at sunset"
      - "orange sky evening"
      - "sunset landscape"

thresholds:
  similarity_min: 0.1

behavior:
  move_files: true
  keep_folder_structure: false
  dry_run: true

files:
  extensions:
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".bmp"
    - ".webp"
    - ".heic"
    - ".gif"